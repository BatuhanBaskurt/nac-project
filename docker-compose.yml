services:
  postgres:
    image: postgres:18-alpine
    container_name: nac-postgres
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - nac-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:8-alpine
    container_name: nac-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    env_file: .env
    volumes:
      - redis_data:/data
    networks:
      - nac-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: python:3.13-slim
    container_name: nac-api
    working_dir: /app
    volumes:
      - ./api:/app
      - ./wheels:/wheels
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    command: >
      sh -c "pip install --no-index --find-links=/wheels fastapi uvicorn sqlalchemy
      psycopg2-binary redis pydantic python-dotenv passlib bcrypt httpx &&
      uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    networks:
      - nac-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 120s

  freeradius:
    build:
      context: ./freeradius
      dockerfile: Dockerfile
    container_name: nac-freeradius
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"
    networks:
      - nac-network
    depends_on:
      api:
        condition: service_healthy
    env_file: .env

networks:
  nac-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
